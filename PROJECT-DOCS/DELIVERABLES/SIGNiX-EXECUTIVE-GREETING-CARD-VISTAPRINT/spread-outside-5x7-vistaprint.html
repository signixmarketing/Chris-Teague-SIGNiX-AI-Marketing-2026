<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SIGNiX · Outside spread · Simple fold-over · VistaPrint bleed</title>
  <style>
    /*
      Folded 5" × 7" card. Flat outside spread: 10" trim × 7" + ⅛" bleed → 10.25" × 7.25".
      Fold at vertical center. Left = back of card. Right = front cover.
    */
    :root {
      --signix-green: #6da34a;
      --canvas: #f8fafb;
      --cover-bg: #2e3440;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --bleed: 0.125in;
      --safe: 0.25in;
      --panel-w: 5.125in;
      --spread-w: 10.25in;
      --spread-h: 7.25in;
    }

    * { box-sizing: border-box; }

    @page {
      size: 10.25in 7.25in;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--spread-w);
      height: var(--spread-h);
      font-family: var(--font);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .spread {
      width: var(--spread-w);
      height: var(--spread-h);
      display: flex;
      flex-direction: row;
    }

    .panel {
      width: var(--panel-w);
      height: var(--spread-h);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--bleed) + var(--safe));
    }

    .panel--back {
      background: var(--canvas);
      border-bottom: 3px solid var(--signix-green);
      padding-right: calc(var(--bleed) + var(--safe) * 0.5);
    }

    .panel--back .logo-4c {
      width: 2.5in;
      max-width: 82%;
    }

    .panel--front {
      background: var(--cover-bg);
      border-bottom: 3px solid var(--signix-green);
      padding-left: calc(var(--bleed) + var(--safe) * 0.5);
    }

    .panel--front .logo-rev {
      width: 3.5in;
      max-width: 88%;
    }

    .logo-4c svg,
    .logo-rev svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .guides {
      display: none;
    }

    @media screen {
      body { background: #888; padding: 12px; width: auto; height: auto; }
      .spread { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25); }
      .guides {
        display: block;
        max-width: var(--spread-w);
        margin: 8px auto 0;
        font-size: 11px;
        color: #222;
        background: #fff;
        padding: 10px 12px;
        border-radius: 6px;
        font-family: var(--font);
      }
    }
  </style>
</head>
